<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arXiv Paper Finder — AI 论文排行榜</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="header-top">
      <h1 class="site-title">arXiv Paper Finder</h1>
      <div class="header-controls">
        <span class="update-badge" id="updateBadge">—</span>
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">🌙</button>
      </div>
    </div>
    <p class="site-desc">每日自动检索 arXiv 最新论文，经双模型 AI 评审评分，精选高创新性研究</p>
  </div>
</header>

<main class="main">
  <div class="toolbar">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" id="searchInput" class="search-input" placeholder="搜索标题、作者、关键词..." autocomplete="off">
    </div>
    <div class="toolbar-filters">
      <select id="fieldFilter" class="filter-select">
        <option value="all">全部领域</option>
      </select>
      <select id="sortSelect" class="filter-select">
        <option value="score-desc">综合得分 ↓</option>
        <option value="date-desc">发布日期 ↓</option>
        <option value="date-asc">发布日期 ↑</option>
      </select>
    </div>
  </div>

  <div class="stats-bar" id="statsBar">
    <span id="statsText">加载中...</span>
  </div>

  <div class="papers-grid" id="papersGrid">
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <p>正在加载论文数据...</p>
    </div>
  </div>

  <div class="empty-state" id="emptyState" style="display:none">
    <p>没有匹配的论文</p>
  </div>
</main>

<footer class="footer">
  <p>由 <a href="https://github.com/rinbarpen/powerful-paper-finder" target="_blank">Powerful Paper Finder</a> 自动生成 · 每日更新</p>
</footer>

<script src="app.js"></script>
</body>
</html>
