name: Daily Paper Finder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install arxiv httpx openai openpyxl pyyaml

      - name: Run paper finder
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python main.py

      - name: Upload Excel artifact
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: arxiv-papers
          path: output/*.xlsx
          if-no-files-found: warn
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/
          retention-days: 7

      - name: Prepare deployment
        if: success()
        run: |
          mkdir -p deploy
          cp output/papers_data.json deploy/data.json
          cp -r frontend/* deploy/

      - name: Deploy to gh-pages branch
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: false
          publish_branch: gh-pages
